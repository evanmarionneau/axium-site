<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">ELAVERIS — Structurer. Décider. Avancer.</title>
  <desc id="desc">Identité noire, or et ivoire d’ELAVERIS, conseil en structuration et pilotage d’entreprise.</desc>
  <defs>
    <radialGradient id="glow" cx="83%" cy="43%" r="44%">
      <stop offset="0" stop-color="#c6a15b" stop-opacity=".2"/>
      <stop offset="1" stop-color="#080a0a" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="78" height="78" patternUnits="userSpaceOnUse">
      <path d="M78 0H0V78" fill="none" stroke="#ffffff" stroke-opacity=".04"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#080a0a"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <text x="76" y="112" fill="#f3efe5" font-family="Inter, Arial, sans-serif" font-size="51" font-weight="700" letter-spacing="12">ELAVERIS</text>
  <line x1="78" y1="143" x2="705" y2="143" stroke="#c6a15b" stroke-width="1.5" opacity=".62"/>
  <text x="78" y="190" fill="#e2c77f" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" letter-spacing="3.3">CONSEIL EN STRUCTURATION ET PILOTAGE</text>

  <text x="75" y="316" fill="#f3efe5" font-family="Georgia, serif" font-size="78">Structurer.</text>
  <text x="164" y="401" fill="#f3efe5" font-family="Georgia, serif" font-size="78">Décider.</text>
  <text x="75" y="486" fill="#e2c77f" font-family="Georgia, serif" font-size="78" font-style="italic">Avancer.</text>

  <image href="logo-elaveris-phoenix-v2.png" x="817" y="66" width="268" height="448"/>
  <text x="952" y="559" text-anchor="middle" fill="#9da6a1" font-family="Inter, Arial, sans-serif" font-size="15" letter-spacing="3">TRANSFORMATION · DIRECTION · TRAJECTOIRE</text>
  <line x1="75" y1="574" x2="1125" y2="574" stroke="#c6a15b" stroke-opacity=".36"/>
</svg>
